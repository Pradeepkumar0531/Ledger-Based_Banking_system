<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerPay — Banking System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <span class="brand-logo">&#x29C6;</span>
            <h1>LedgerPay</h1>
            <p>Secure Digital Banking</p>
        </div>

        <div class="auth-card">
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-content active">
                <h2>Welcome back</h2>
                <p class="subtitle">Sign in to your account</p>
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
                </div>
                <button class="btn btn-primary btn-full" onclick="loginUser(this)">
                    <span>Sign In</span>
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerTab" class="tab-content">
                <h2>Create account</h2>
                <p class="subtitle">Start banking with LedgerPay</p>
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
                </div>
                <button class="btn btn-primary btn-full" onclick="registerUser(this)">
                    <span>Create Account</span>
                </button>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
